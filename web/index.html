<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Line of Sight</title>
    <meta
      name="description"
      content="A Total Reality Engineering tool for extracting and reviewing tactical map line-of-sight data."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="https://tre.systems/" aria-label="Total Reality Engineering">
          <svg
            class="brand-logo"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            aria-hidden="true"
          >
            <g>
              <rect
                x="214"
                y="288"
                width="80"
                height="206"
                fill="#19C15E"
                transform="rotate(22, 262, 295)"
              />
              <path
                d="M256 36 L72 476 L440 476 Z"
                fill="none"
                stroke="#F5F5F5"
                stroke-width="30"
                stroke-linejoin="round"
                stroke-linecap="round"
              />
              <circle cx="256" cy="288" r="40" fill="#F5F5F5" />
            </g>
          </svg>
          <div class="brand-copy">
            <span>Total Reality Engineering</span>
            <h1>Line of Sight</h1>
            <p id="runtimeStatus">Loading line-of-sight tools...</p>
          </div>
        </a>
        <div class="toolbar">
          <label class="file-button primary-action">
            <input id="fileInput" type="file" accept="image/*" multiple />
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12" />
              <path d="m7 8 5-5 5 5" />
              <path d="M5 15v3a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-3" />
            </svg>
            <span>Select maps</span>
          </label>
          <label class="number-control">
            <span>Columns</span>
            <input id="columnsInput" type="number" min="1" max="12" value="2" />
          </label>
          <label class="number-control">
            <span>Grid</span>
            <input id="gridInput" type="number" min="10" max="200" value="50" />
          </label>
          <label class="sight-control">
            <span>
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                <circle cx="12" cy="12" r="2.5" />
              </svg>
              Sight
            </span>
            <input id="radiusInput" type="range" min="50" max="5000" step="50" value="700" />
            <output id="radiusValue" for="radiusInput">700</output>
          </label>
          <button id="showWallsButton" type="button" aria-pressed="false">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16" />
              <path d="M4 12h16" />
              <path d="M4 17h16" />
            </svg>
            <span>Show walls</span>
          </button>
          <button id="analyzeButton" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 4h6v6" />
              <path d="M20 4 13 11" />
              <path d="M4 20 10.5 13.5" />
              <path d="m8 4 1.5 3L13 8.5 9.5 10 8 13 6.5 10 3 8.5 6.5 7 8 4Z" />
            </svg>
            <span>Analyze</span>
          </button>
          <button id="resetFogButton" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v6h6" />
            </svg>
            <span>Reset fog</span>
          </button>
          <button id="exportButton" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12" />
              <path d="m7 10 5 5 5-5" />
              <path d="M5 21h14" />
            </svg>
            <span>Export</span>
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside class="sidebar">
          <div class="panel">
            <h2>Tools</h2>
            <div class="tool-grid" role="group" aria-label="Map editing tools">
              <button class="tool-button active" type="button" data-tool="viewer">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                  <circle cx="12" cy="12" r="2.5" />
                </svg>
                <span>Viewer</span>
              </button>
              <button class="tool-button" type="button" data-tool="wall">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 8h16" />
                  <path d="M4 16h16" />
                  <path d="M8 8v8" />
                  <path d="M16 8v8" />
                </svg>
                <span>Wall</span>
              </button>
              <button class="tool-button" type="button" data-tool="door">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 21V4h10v17" />
                  <path d="M15 8h4v13" />
                  <path d="M11 13h.01" />
                </svg>
                <span>Door</span>
              </button>
              <button class="tool-button" type="button" data-tool="erase">
                <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m16 3 5 5-11 11H5l-3-3L16 3Z" />
                  <path d="M10 19h11" />
                </svg>
                <span>Erase</span>
              </button>
            </div>
          </div>

          <div class="panel">
            <h2>Tiles</h2>
            <div id="tileList" class="tile-list"></div>
          </div>

          <div class="panel">
            <h2>State</h2>
            <dl class="stats">
              <div>
                <dt>Board</dt>
                <dd id="boardStat">0 x 0</dd>
              </div>
              <div>
                <dt>Occluders</dt>
                <dd id="occluderStat">0</dd>
              </div>
              <div>
                <dt>Doors</dt>
                <dd id="doorStat">0</dd>
              </div>
              <div>
                <dt>GPU</dt>
                <dd id="gpuStat">Checking...</dd>
              </div>
            </dl>
          </div>
        </aside>

        <section class="board-panel">
          <div id="boardViewport" class="board-viewport">
            <canvas id="boardCanvas" width="1000" height="1000"></canvas>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
