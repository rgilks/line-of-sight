name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ENVIRONMENT: production
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'total-reality-engineering' }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'line-of-sight' }}
          SENTRY_RELEASE: ${{ github.sha }}
          VITE_SENTRY_DSN: ${{ github.ref == 'refs/heads/main' && vars.VITE_SENTRY_DSN || '' }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}

      - name: Diagram check
        run: npm run check:diagrams

  # Route smoke test. Hermetic: builds the client, runs the Worker (Durable
  # Object + R2) in wrangler's *local* simulator — no Cloudflare account,
  # secrets, or deployed target needed — and loads every route (/, /play, /edit,
  # /solo) in headless Chromium, asserting each bundle boots its key element with
  # no console/page errors, plus a /healthz check. It deliberately does not drive
  # the multiplayer game flow: that is too coupled to fast-moving UI and movement
  # mechanics for a fixed-coordinate browser script to stay green. To debug a
  # failure locally:
  #   npm run build && npm run serve:worker                 # in one shell
  #   LOS_BASE_URL=http://127.0.0.1:8787 npm run test:e2e   # in another
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build client
        run: npm run build

      - name: Start Worker (local)
        run: npm run serve:worker > wrangler-dev.log 2>&1 &

      - name: Wait for Worker
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8787/healthz > /dev/null; then
              echo "Worker is up."
              exit 0
            fi
            sleep 2
          done
          echo "Worker did not become healthy in time." >&2
          cat wrangler-dev.log >&2 || true
          exit 1

      - name: Route smoke test
        run: npm run test:e2e
        env:
          LOS_BASE_URL: http://127.0.0.1:8787

      - name: Worker log (on failure)
        if: failure()
        run: cat wrangler-dev.log
