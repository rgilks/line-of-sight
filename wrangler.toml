name = "line-of-sight"
main = "src/worker.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_als"]
workers_dev = true
preview_urls = false

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
SENTRY_ENVIRONMENT = "production"
SENTRY_PROJECT = "line-of-sight"

[[durable_objects.bindings]]
name = "TABLES"
class_name = "GameTable"

# Server-authoritative single-player/companion games (Survive the Horde). One DO
# per game, isolated from the multiplayer GameTable. See docs/COMPANION-PLAY.md.
[[durable_objects.bindings]]
name = "SOLO_ROOMS"
class_name = "SoloRoom"

[[migrations]]
tag = "v1"
new_classes = ["GameTable"]

[[migrations]]
tag = "v2"
new_classes = ["SoloRoom"]

# Private bucket for GM-uploaded map images. Not public; served only through the
# Worker's /api/tables/:id/map/:ref route. See docs/MULTIPLAYER.md.
[[r2_buckets]]
binding = "MAPS"
bucket_name = "line-of-sight-maps"

[[routes]]
pattern = "los.tre.systems"
custom_domain = true
